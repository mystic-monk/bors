services:
  - type: web
    name: bors
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn bors_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: bors-db
          property: connectionString

databases:
  - name: bors-db
    plan: free

{% comment %}Include this partial in each step template.
Requires: steps (list of tuples), current_step (int){% endcomment %}
<div class="stepper">
  {% for slug, label, num in steps %}
    {% if num > 1 %}
      <div class="step-connector {% if num <= current_step %}done{% endif %}"></div>
    {% endif %}
    <div class="step-item {% if num == current_step %}active{% elif num < current_step %}done{% endif %}">
      <div class="step-circle">
        {% if num < current_step %}
          <i class="bi bi-check-lg"></i>
        {% else %}
          {{ num }}
        {% endif %}
      </div>
      <span class="step-label">{{ label }}</span>
    </div>
  {% endfor %}
</div>
